<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Stream</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
      gap: 1rem;
    }
    h1 { font-size: 1.4rem; letter-spacing: 0.05em; opacity: 0.8; }
    #startBtn {
      padding: 0.75rem 2rem;
      font-size: 1.1rem;
      background: #e03;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #startBtn:hover { background: #c02; }
    #stream-wrapper {
      width: 100%;
      max-width: 1280px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }
    #stream-wrapper iframe {
      width: 100vw;
      height: 100vh;
      border: 0;
      margin: 0;
      padding: 0;
    }
    #status { font-size: 0.85rem; opacity: 0.5; min-height: 1.2em; }
  </style>
</head>
<body>
  <h1>Live Stream</h1>
  <button id="startBtn">&#9654; Watch Live</button>

  <div id="stream-wrapper">
    <!--
      allow string sourced directly from:
      https://github.com/steveseguin/vdo.ninja/blob/develop/examples/overlay.html

      &push=Ce4HsNS        — connects to stream Ce4HsNS
      &cleanoutput         — hides VDO.Ninja UI chrome
      &transparent         — transparent background
      &autoplay            — autoplay after user gesture (button click)
      &videodevice=0       — disables viewer camera
      &audiodevice=0       — disables viewer mic
    -->
    <iframe
      id="stream"
      src=""
      allow="document-domain;encrypted-media;sync-xhr;usb;web-share;cross-origin-isolated;accelerometer;midi;geolocation;autoplay;camera;microphone;fullscreen;picture-in-picture;display-capture;"
      allowfullscreen
      allowtransparency="true">
    </iframe>
  </div>

  <p id="status"></p>

  <script>
    var STREAM_ID = 'Ce4HsNS';

    var iframe  = document.getElementById('stream');
    var wrapper = document.getElementById('stream-wrapper');
    var status  = document.getElementById('status');

    // iframe src set on click — browsers require a user gesture before allowing autoplay
    document.getElementById('startBtn').addEventListener('click', function () {
      iframe.src = 'https://vdo.ninja/?push=' + STREAM_ID +
                   '&cleanoutput&transparent&autoplay&videodevice=0&audiodevice=0';
      wrapper.style.display = 'block';
      document.getElementById('startBtn').style.display = 'none';
    });

    // ---- IFRAME API event listener ----
    // Pattern from: https://github.com/steveseguin/vdo.ninja/blob/develop/iframe.html
    var eventMethod  = window.addEventListener ? 'addEventListener' : 'attachEvent';
    var eventer      = window[eventMethod];
    var messageEvent = eventMethod === 'attachEvent' ? 'onmessage' : 'message';

    eventer(messageEvent, function (e) {
      if (e.source !== iframe.contentWindow) { return; } // reject messages from other iframes

      if ('action' in e.data) {
        status.textContent = 'Event: ' + e.data.action;
      }
      if ('gotChat' in e.data) {
        status.textContent = 'Chat: ' + e.data.gotChat.msg;
      }
      if ('loudness' in e.data) {
        var levels = [];
        for (var key in e.data.loudness) {
          levels.push(key + ': ' + e.data.loudness[key]);
        }
        status.textContent = 'Loudness — ' + levels.join(' | ');
      }
      if ('stats' in e.data) {
        var inbound  = e.data.stats.inbound  || e.data.stats.inbound_stats  || {};
        var outbound = e.data.stats.outbound || e.data.stats.outbound_stats || {};
        status.textContent = 'Stats — inbound: ' + Object.keys(inbound).length +
                             ', outbound: ' + Object.keys(outbound).length;
      }
    }, false);
  </script>
</body>
</html>
