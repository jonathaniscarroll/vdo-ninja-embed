<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    h1 {
      margin-bottom: 1rem;
      font-size: 1.4rem;
      letter-spacing: 0.05em;
      opacity: 0.8;
    }
    #startBtn {
      padding: 0.75rem 2rem;
      font-size: 1.1rem;
      background: #e03;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 1.5rem;
      transition: background 0.2s;
    }
    #startBtn:hover { background: #c02; }
    #stream-wrapper {
      width: 100%;
      max-width: 1280px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }
    #stream-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <h1>Live Stream</h1>
  <button id="startBtn">&#9654; Watch Live</button>
  <div id="stream-wrapper">
    <iframe
      id="stream"
      src=""
      allow="camera; microphone; autoplay; fullscreen; display-capture"
      allowfullscreen
      allowtransparency="true">
    </iframe>
  </div>

  <script>
    // Replace YOUR_STREAM_ID with your VDO.Ninja view/stream ID
    const STREAM_ID = 'nscadu';

    document.getElementById('startBtn').addEventListener('click', () => {
      const iframe = document.getElementById('stream');
      const wrapper = document.getElementById('stream-wrapper');
      iframe.src = `https://vdo.ninja/?scene&room=${STREAM_ID}&cleanoutput&autoplay`;
      wrapper.style.display = 'block';
      document.getElementById('startBtn').style.display = 'none';
    });
  </script>
</body>
</html>
