<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
      gap: 1rem;
    }
    h1 { font-size: 1.4rem; letter-spacing: 0.05em; opacity: 0.8; }
    #startBtn {
      padding: 0.75rem 2rem;
      font-size: 1.1rem;
      background: #e03;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #startBtn:hover { background: #c02; }
    #stream-wrapper {
      width: 100%;
      max-width: 1280px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }
    #stream-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    #status { font-size: 0.85rem; opacity: 0.5; min-height: 1.2em; }
  </style>
</head>
<body>
  <h1>Live Stream</h1>
  <button id="startBtn">&#9654; Watch Live</button>
  <div id="stream-wrapper">
    <!-- iframe src is set on click to satisfy browser autoplay policies -->
    <!-- allow list mirrors VDO.Ninja docs recommendations -->
    <iframe
      id="stream"
      src=""
      allow="camera; microphone; autoplay; fullscreen; display-capture"
      allowfullscreen
      allowtransparency="true">
    </iframe>
  </div>
  <p id="status"></p>

  <script>
    // Replace with your VDO.Ninja stream ID
    // e.g. if your push link is https://vdo.ninja/?push=JkYwyxy
    // then STREAM_ID = 'JkYwyxy'
    var STREAM_ID = 'YOUR_STREAM_ID';

    var iframe = document.getElementById('stream');
    var wrapper = document.getElementById('stream-wrapper');
    var status = document.getElementById('status');

    document.getElementById('startBtn').addEventListener('click', function () {
      // &cleanoutput removes VDO.Ninja UI chrome
      // &autoplay starts video immediately after user gesture
      iframe.src = 'https://vdo.ninja/?view=' + STREAM_ID + '&cleanoutput&autoplay';
      wrapper.style.display = 'block';
      document.getElementById('startBtn').style.display = 'none';
    });

    // --- IFRAME API: listen for events from VDO.Ninja ---
    // See https://docs.vdo.ninja/guides/iframe-api-documentation
    var eventMethod = window.addEventListener ? 'addEventListener' : 'attachEvent';
    var eventer = window[eventMethod];
    var messageEvent = eventMethod === 'attachEvent' ? 'onmessage' : 'message';

    eventer(messageEvent, function (e) {
      // Only handle messages from our VDO.Ninja iframe
      if (e.source !== iframe.contentWindow) return;

      if ('action' in e.data) {
        handleAction(e.data);
      }
    }, false);

    function handleAction(data) {
      if (data.action === 'view-connection') {
        status.textContent = data.value ? 'Stream connected.' : 'Stream disconnected.';
      } else if (data.action === 'guest-connected') {
        status.textContent = 'Guest connected: ' + (data.value && data.value.label ? data.value.label : data.streamID);
      } else if (data.action === 'director-connected') {
        status.textContent = 'Director connected.';
      } else if (data.action === 'push-connection' && data.value === false) {
        status.textContent = 'Stream ended.';
      }
    }
  </script>
</body>
</html>
