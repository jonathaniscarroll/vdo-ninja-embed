<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
      gap: 1rem;
    }
    h1 { font-size: 1.4rem; letter-spacing: 0.05em; opacity: 0.8; }
    #startBtn {
      padding: 0.75rem 2rem;
      font-size: 1.1rem;
      background: #e03;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #startBtn:hover { background: #c02; }
    #stream-wrapper {
      width: 100%;
      max-width: 1280px;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
      display: none;
    }
    #stream-wrapper iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
    #status { font-size: 0.85rem; opacity: 0.5; min-height: 1.2em; }
  </style>
</head>
<body>
  <h1>Live Stream</h1>
  <button id="startBtn">&#9654; Watch Live</button>

  <div id="stream-wrapper">
    <iframe
      id="stream"
      src=""
      allow="encrypted-media;sync-xhr;usb;web-share;midi *;geolocation;camera *;microphone *;fullscreen;picture-in-picture;display-capture;accelerometer;autoplay;gyroscope;screen-wake-lock;"
      allowfullscreen
      allowtransparency="true">
    </iframe>
  </div>

  <p id="status"></p>

  <script>
    var STREAM_ID = 'Ce4HsNS';

    var iframe = document.getElementById('stream');
    var wrapper = document.getElementById('stream-wrapper');
    var status  = document.getElementById('status');

    // Set src on click so browsers allow autoplay (requires user gesture)
    document.getElementById('startBtn').addEventListener('click', function () {
      iframe.src = 'https://vdo.ninja/?push=' + STREAM_ID + '&cleanoutput&transparent&autoplay';
      wrapper.style.display = 'block';
      document.getElementById('startBtn').style.display = 'none';
    });

    // ---- IFRAME API: listen for events from VDO.Ninja child frame ----
    // Pattern from official docs: iframe.html
    var eventMethod = window.addEventListener ? 'addEventListener' : 'attachEvent';
    var eventer     = window[eventMethod];
    var messageEvent = eventMethod === 'attachEvent' ? 'onmessage' : 'message';

    eventer(messageEvent, function (e) {
      if (e.source !== iframe.contentWindow) { return; } // reject other iframes

      if ('action' in e.data) {
        status.textContent = 'Event: ' + e.data.action;
      }

      if ('gotChat' in e.data) {
        status.textContent = 'Chat: ' + e.data.gotChat.msg;
      }

      if ('loudness' in e.data) {
        var levels = [];
        for (var key in e.data.loudness) {
          levels.push(key + ': ' + e.data.loudness[key]);
        }
        status.textContent = 'Loudness — ' + levels.join(' | ');
      }

      if ('stats' in e.data) {
        var inbound  = e.data.stats.inbound  || e.data.stats.inbound_stats  || {};
        var outbound = e.data.stats.outbound || e.data.stats.outbound_stats || {};
        status.textContent = 'Stats — inbound connections: ' +
          Object.keys(inbound).length + ', outbound: ' + Object.keys(outbound).length;
      }
    }, false);
  </script>
</body>
</html>
